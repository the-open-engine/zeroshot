[workspace]
resolver = "2"
members = [
  "crates/openengine-cluster-protocol",
  "crates/openengine-cluster-server",
  "crates/openengine-cluster-client",
  "crates/openengine-cluster-testkit",
]

[workspace.package]
edition = "2024"
rust-version = "1.85"
license = "MIT"

[workspace.dependencies]
anyhow = "1.0"
async-trait = "0.1"
schemars = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tokio = { version = "1.0", features = ["io-std", "io-util", "macros", "process", "rt-multi-thread", "sync"] }
