name: Release

on:
  # Auto-release after CI passes on main
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  # Manual trigger for DRY-RUN ONLY (testing release process)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run ONLY (no publish allowed)'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  install-matrix:
    # Run only for real release flow or manual dry-run
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.dry_run == true) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    # Cross-platform/version compatibility before release
    # NOTE: macOS runners cost 10x Linux minutes - minimal matrix
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 20
          - os: macos-latest
            node: 20

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        env:
          ZEROSHOT_TUI_BINARY_SKIP: '1'
        run: npm ci

      - name: Link CLI
        run: npm link

      - name: CLI smoke test
        run: |
          zeroshot --help
          zeroshot --version
          zeroshot list

      - name: Test process-metrics (platform-specific)
        run: |
          node -e "
          (async () => {
            const { getProcessMetrics, formatMetrics, getStateIcon, isPlatformSupported, getPlatformInfo } = require('./src/process-metrics');
            const os = require('os');

            console.log('Platform:', os.platform());
            console.log('Supported:', isPlatformSupported());
            console.log('Platform info:', JSON.stringify(getPlatformInfo()));

            // Test metrics collection
            const metrics = await getProcessMetrics(process.pid, { samplePeriodMs: 100 });
            console.log('Metrics:', JSON.stringify(metrics, null, 2));

            // Validate required fields
            if (!metrics.exists) throw new Error('Process should exist');
            if (typeof metrics.cpuPercent !== 'number') throw new Error('cpuPercent must be number');
            if (typeof metrics.memoryMB !== 'number') throw new Error('memoryMB must be number');
            if (!metrics.state) throw new Error('state must be set');

            console.log('Formatted:', formatMetrics(metrics));
            console.log('State icon:', getStateIcon(metrics.state, metrics.network?.hasActivity));

            console.log('✓ Process metrics test passed on', os.platform());
          })().catch(e => { console.error(e); process.exit(1); });
          "

      - name: Test status-footer
        run: |
          node -e "
          const { StatusFooter } = require('./src/status-footer');

          const footer = new StatusFooter({ enabled: false });
          footer.setCluster('test-cluster');
          footer.setClusterState('running');
          footer.updateAgent({ id: 'worker', state: 'executing_task', pid: process.pid, iteration: 1 });

          const statusLine = footer.buildStatusLine(80);
          if (!statusLine.includes('running')) throw new Error('Status line missing state');
          if (!statusLine.includes('1/1')) throw new Error('Status line missing agent count');

          footer.stop();
          console.log('✓ StatusFooter test passed');
          "

  tui-binary-matrix:
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.dry_run == true) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm64
            platform: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            platform: darwin
            arch: x64
            target: x86_64-apple-darwin
          - os: macos-14
            platform: darwin
            arch: arm64
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build zeroshot-tui
        run: |
          cargo build --release -p zeroshot-tui --target ${{ matrix.target }} --manifest-path tui-rs/Cargo.toml

      - name: Smoke test binary
        run: |
          BIN_PATH="tui-rs/target/${{ matrix.target }}/release/zeroshot-tui"
          "$BIN_PATH" --version
          "$BIN_PATH" --smoke-test

      - name: Package release asset
        run: |
          BIN_DIR="tui-rs/target/${{ matrix.target }}/release"
          ASSET="zeroshot-tui-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"
          tar -czf "$ASSET" -C "$BIN_DIR" zeroshot-tui
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ASSET" > "$ASSET.sha256"
          else
            shasum -a 256 "$ASSET" > "$ASSET.sha256"
          fi

      - name: Upload TUI binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: tui-binary-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            zeroshot-tui-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
            zeroshot-tui-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz.sha256

  release:
    needs: [install-matrix, tui-binary-matrix]
    # SAFETY: Only run if CI passed OR manual dry-run
    # Real releases MUST go through CI (workflow_run with success)
    # Manual trigger MUST be dry-run only (cannot publish untested code)
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.dry_run == true) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          # NOTE: Do NOT set persist-credentials: false here
          # Semantic-release needs git credentials to query remote tags

      - name: Fetch all tags
        run: |
          git fetch --tags --force
          echo "Available tags:"
          git tag -l | tail -10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        env:
          ZEROSHOT_TUI_BINARY_SKIP: '1'
        run: npm ci

      - name: Download TUI binaries
        uses: actions/download-artifact@v4
        with:
          pattern: tui-binary-*
          path: dist/tui
          merge-multiple: true

      - name: Prepare TUI binary for install validation
        run: |
          ls -la dist/tui
          tar -xzf dist/tui/zeroshot-tui-linux-x64.tar.gz -C dist/tui
          chmod +x dist/tui/zeroshot-tui

      - name: Verify package before release
        run: |
          # Create tarball (respects 'files' array in package.json)
          # Extract last line only (tarball filename) to avoid capturing prepare script output
          TARBALL=$(npm pack | tail -1)
          echo "Created: $TARBALL"

          # Install from tarball (simulates npm install -g @covibes/zeroshot)
          ZEROSHOT_TUI_BINARY_PATH="$PWD/dist/tui/zeroshot-tui" npm install -g "./$TARBALL"

          # Smoke tests - must all pass
          echo "=== Testing installed package ==="
          zeroshot --version
          zeroshot --help
          zeroshot list
          INSTALLED_ROOT="$(npm root -g)/@covibes/zeroshot"
          test -x "$INSTALLED_ROOT/libexec/zeroshot-tui"
          "$INSTALLED_ROOT/libexec/zeroshot-tui" --version

          # Cleanup
          npm uninstall -g @covibes/zeroshot
          rm "$TARBALL"

          echo "✅ Package verification passed"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # SAFETY: Manual triggers MUST be dry-run only
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "⚠️  Manual trigger detected - enforcing dry-run mode"
            npx semantic-release --dry-run
          elif [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "ℹ️  Dry-run mode enabled"
            npx semantic-release --dry-run
          else
            echo "🚀 Publishing release (triggered by CI passing)"
            npx semantic-release
          fi
